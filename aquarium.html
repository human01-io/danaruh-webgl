<!DOCTYPE html>
<html lang="en" class="browser-chrome device-pc">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Aquarium's Very Own Home Page</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --pink: #EE0055;
            --cyan: #01f4ff;
            --cyan-dim: rgba(1, 244, 255, 0.33);
            --teal: #119aa7;
        }

        html, body {
            background: #000;
            color: #fff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 16px;
            font-weight: 400;
            overflow-x: hidden;
        }

        body.block-scroll {
            overflow-x: hidden;
            position: fixed;
            width: 100%;
            overflow-y: scroll !important;
        }

        /* ─── 3D Canvas ─── */
        .aquarium-3d {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            overflow: hidden;
        }

        .aquarium-3d canvas {
            width: 100%; height: 100%;
            display: block;
        }

        /* ─── Noise overlay ─── */
        .noise-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 3;
            opacity: 0.04;
            background: url('assets/textures/noise.png') repeat;
            mix-blend-mode: overlay;
        }

        /* ─── Hidden scroll driver ─── */
        .aquarium-scroll {
            height: 100%;
            opacity: 0;
            overflow: auto;
            position: fixed;
            top: 0; left: 0;
            width: 30px;
            z-index: 0;
        }

        .aquarium-scroll__height {
            height: 9000vh;
        }

        /* ─── Main content layer ─── */
        .app-page {
            background: transparent;
            position: relative;
            z-index: 2;
            min-height: 9000vh;
            pointer-events: none;
        }

        /* ─── Header ─── */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 3000;
            padding: 1.8rem 2.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.2rem;
            pointer-events: auto;
            color: #fff;
        }

        header::before {
            content: "";
            pointer-events: none;
            position: absolute;
            inset: 0 0 -1rem;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0));
        }

        .nav-left {
            position: absolute;
            left: 2rem;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .nav-right {
            position: absolute;
            right: 2rem;
            top: 50%;
            transform: translateY(-50%);
        }

        .sound-button {
            width: 28px; height: 28px;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            transition: border-color 0.3s;
        }

        .sound-button:hover { border-color: #fff; }

        .lang-switch {
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            font-size: 13px;
            letter-spacing: 0.05em;
            transition: color 0.3s;
        }
        .lang-switch:hover { color: #fff; }

        .logo {
            width: 24px; height: 24px;
            background: #fff;
            color: #000;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            border-radius: 2px;
            text-decoration: none;
            position: relative;
            z-index: 1;
        }

        .menu-item {
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            transition: color 0.35s;
            position: relative;
            z-index: 1;
        }
        .menu-item:hover { color: #fff; }

        .menu-emoji {
            font-size: 13px;
            margin: 0 0.3rem;
        }

        .menu-link-site {
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: color 0.35s;
            position: relative;
            z-index: 1;
        }
        .menu-link-site:hover { color: #fff; }

        /* ─── Home content ─── */
        .home-content {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 20;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 1;
            transition: opacity 0.6s ease;
        }

        .home-content.faded { opacity: 0; }

        .title {
            font-size: clamp(5rem, 12vw, 10rem);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: -0.01em;
            line-height: 1;
            position: relative;
            text-align: center;
        }

        .title__dot {
            position: absolute;
            top: 0;
            left: 0.24em;
            width: 0.19em;
            height: 0.19em;
            background: #fff;
            border-radius: 50%;
        }

        /* ─── Footer row (fixed bottom) ─── */
        .footer-row {
            position: fixed;
            left: 0; right: 0; bottom: 0;
            z-index: 25;
            padding: 2rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            pointer-events: none;
            opacity: 1;
            transition: opacity 0.6s, transform 0.6s;
            transform: translateY(0);
        }

        .footer-row.hide {
            opacity: 0;
            transform: translateY(3rem);
        }

        .footer-row * { pointer-events: auto; }

        .footer-col {
            max-width: 300px;
        }

        .footer-col .date {
            font-size: clamp(1.2rem, 3vw, 2rem);
            font-weight: 700;
            margin-bottom: 0.2rem;
        }

        .footer-col .city {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.5);
        }

        .footer-col a {
            color: #fff;
            text-decoration: none;
            border-bottom: 2px solid var(--cyan-dim);
            padding-bottom: 1px;
            font-size: 0.85rem;
            transition: color 0.35s, border-color 0.35s;
        }
        .footer-col a:hover {
            color: var(--teal);
            border-bottom-color: var(--teal);
        }

        .footer-right {
            text-align: right;
        }

        .footer-right a {
            display: block;
            margin-bottom: 0.5rem;
        }

        /* ─── Scroll hint ─── */
        .scroll-hint {
            position: fixed;
            bottom: 2.5rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 30;
            text-align: center;
            opacity: 1;
            transition: opacity 0.5s;
            pointer-events: none;
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            letter-spacing: 0.1em;
        }
        .scroll-hint.hidden { opacity: 0; }
        .scroll-hint img {
            display: block;
            margin: 0 auto 6px;
            width: 18px;
            filter: invert(1);
            opacity: 0.5;
            animation: bob 2s ease-in-out infinite;
        }
        @keyframes bob {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(6px); }
        }

        /* ─── Loading screen ─── */
        .preloader {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            z-index: 5000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 1s ease;
        }
        .preloader.done { opacity: 0; pointer-events: none; }
        .preloader__ring {
            width: 120px; height: 120px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: spin 8s linear infinite;
            position: relative;
        }
        .preloader__ring::before {
            content: "загрузка ✦ загрузка ✦ загрузка ✦ загрузка ✦";
            position: absolute;
            font-size: 10px;
            letter-spacing: 0.1em;
            color: rgba(255,255,255,0.6);
            width: 200%;
            text-align: center;
            animation: spin 12s linear infinite reverse;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .preloader__button {
            width: 70px; height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, #8338ec, #00f5d4);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 10px;
            text-align: center;
            line-height: 1.3;
            font-weight: 500;
            transition: transform 0.3s;
        }
        .preloader__button:hover { transform: scale(1.1); }
        .preloader__percent {
            margin-top: 1.5rem;
            font-size: 13px;
            color: rgba(255,255,255,0.4);
        }

        /* ─── Progress bar ─── */
        #progress {
            position: fixed;
            bottom: 0; left: 0;
            height: 2px;
            background: var(--pink);
            z-index: 4000;
            width: 0%;
            transition: width 0.15s linear;
        }
    </style>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>

<!-- Loading screen -->
<div class="preloader" id="preloader">
    <div class="preloader__ring">
        <div class="preloader__button" id="preloader-btn">Click<br>to enter</div>
    </div>
    <div class="preloader__percent"><span id="load-pct">0</span>%</div>
</div>

<div id="progress"></div>

<!-- 3D Canvas -->
<div class="aquarium-3d">
    <canvas id="c"></canvas>
</div>

<div class="noise-overlay"></div>

<!-- Header nav -->
<header>
    <div class="nav-left">
        <div class="sound-button">&#9834;</div>
        <a href="#" class="lang-switch">EN</a>
    </div>

    <a href="#logo" class="logo">A</a>
    <a href="#scene-forms" class="menu-item">Forms of Life</a>
    <span class="menu-emoji">🟥</span>
    <a href="#scene-albums" class="menu-item">Albums &amp; Others</a>
    <span class="menu-emoji">🎵</span>
    <a href="#scene-people" class="menu-item">Co-Authors</a>
    <span class="menu-emoji">🐦</span>
    <a href="#scene-room" class="menu-item">Origin</a>
    <span class="menu-emoji">🎨</span>
    <a href="#scene-leader" class="menu-item">Leader G</a>
    <span class="menu-emoji">🌊</span>

    <div class="nav-right">
        <a href="#" class="menu-link-site">Full Site</a>
    </div>
</header>

<!-- Home content overlay -->
<div class="home-content" id="home-content">
    <div class="title">
        <span class="title__dot"></span>
        АКВАРИУМ
    </div>
</div>

<!-- Footer overlay -->
<div class="footer-row" id="footer-row">
    <div class="footer-col">
        <div class="date">01.11.2020</div>
        <div class="city">Лиепая</div>
        <div class="date" style="margin-top:0.8rem">30.10.2020</div>
        <div class="city">Резекне</div>
        <div style="margin-top:1rem">
            <a href="#">All concerts</a>
        </div>
    </div>
    <div class="footer-col footer-right">
        <a href="mailto:bg@aquarium.ru">bg@aquarium.ru</a>
        <a href="#">Designed at Art. Lebedev Studio</a>
        <a href="#">About the site</a>
    </div>
</div>

<div class="scroll-hint" id="scroll-hint">
    <img src="assets/textures/scroll.png" alt="" />
    scroll down
</div>

<!-- Scroll driver (invisible) -->
<div class="app-page" id="scroll-driver"></div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
import { KTX2Loader } from 'three/addons/loaders/KTX2Loader.js';
import { MeshoptDecoder } from 'three/addons/libs/meshopt_decoder.module.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

// ─── SCENE MAP: matching aquarium.ru scroll anchors ───
// Each scene occupies a % range of the total scroll.
// The camera orbits INSIDE each scene as you scroll through its range.
const SCENES = [
    { file: '00.Main.glb',       id: 'logo',                pct: 0.0,    name: 'Main' },
    { file: '01.Space.glb',      id: 'scene-forms',         pct: 0.025,  name: 'Forms of Life' },
    { file: '03.Squaretube.glb', id: 'scene-forms-tunnel',  pct: 0.213,  name: 'Forms Tunnel' },
    { file: '02.Albums.glb',     id: 'scene-albums',        pct: 0.280,  name: 'Albums' },
    { file: '05.Shapemoire.glb', id: 'scene-albums-tunnel', pct: 0.422,  name: 'Albums Tunnel' },
    { file: '04.People.glb',     id: 'scene-people',        pct: 0.518,  name: 'People' },
    { file: '07.Spiraltube.glb', id: 'scene-people-tunnel', pct: 0.666,  name: 'People Tunnel' },
    { file: '06.Porch.glb',      id: 'scene-room',          pct: 0.709,  name: 'Room/Porch' },
    { file: '09.Circle.glb',     id: 'scene-room-tunnel',   pct: 0.852,  name: 'Room Tunnel' },
    { file: '08.Painting.glb',   id: 'scene-leader',        pct: 0.875,  name: 'Leader' },
];

// ─── RENDERER ───
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 5000);
camera.position.set(0, 5, 40);

// ─── POST-PROCESSING ───
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloomPass = new UnrealBloomPass(
    new THREE.Vector2(window.innerWidth, window.innerHeight),
    0.4, 0.3, 0.7
);
composer.addPass(bloomPass);
composer.addPass(new OutputPass());

// ─── LIGHTS ───
scene.add(new THREE.AmbientLight(0xffffff, 1.0));
const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(10, 20, 15);
scene.add(dirLight);

const movingLight1 = new THREE.PointLight(0xEE0055, 2, 300, 1);
scene.add(movingLight1);
const movingLight2 = new THREE.PointLight(0x3a86ff, 1.5, 300, 1);
scene.add(movingLight2);
const movingLight3 = new THREE.PointLight(0xffbe0b, 1, 200, 1);
scene.add(movingLight3);

// ─── LOAD MODELS ───
const ktx2Loader = new KTX2Loader();
ktx2Loader.setTranscoderPath('https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/libs/basis/');
ktx2Loader.detectSupport(renderer);

const dracoLoader = new DRACOLoader();
dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/libs/draco/');

const loader = new GLTFLoader();
loader.setDRACOLoader(dracoLoader);
loader.setKTX2Loader(ktx2Loader);
loader.setMeshoptDecoder(MeshoptDecoder);
const loadPct = document.getElementById('load-pct');
const preloader = document.getElementById('preloader');
const preloaderBtn = document.getElementById('preloader-btn');

const loadedScenes = [];
let loadedCount = 0;
let activeSceneIdx = -1;

// Pre-warm KTX2 transcoder by loading a tiny test, then load all models
function loadAllModels() {
const promises = SCENES.map((entry, i) => new Promise(resolve => {
    loader.load(
        'assets/models/' + entry.file,
        (gltf) => {
            const model = gltf.scene;

            // Fix any broken materials from failed textures
            model.traverse((child) => {
                if (child.isMesh && child.material) {
                    const mat = child.material;
                    // Ensure materials render even without textures
                    if (!mat.color) mat.color = new THREE.Color(0xcccccc);
                    mat.needsUpdate = true;
                }
            });

            // Normalize model: center at origin, scale to target size
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z, 0.01);
            const TARGET_SIZE = 40;
            const scaleFactor = TARGET_SIZE / maxDim;
            model.scale.multiplyScalar(scaleFactor);
            model.position.copy(center).multiplyScalar(-scaleFactor);
            const radius = TARGET_SIZE * 0.5;

            // Set up animation mixer (scroll-driven, not auto-play)
            let mixer = null;
            let actions = [];
            let totalDuration = 0;
            if (gltf.animations?.length) {
                mixer = new THREE.AnimationMixer(model);
                gltf.animations.forEach(clip => {
                    const action = mixer.clipAction(clip);
                    action.play();
                    action.paused = true; // We drive time manually
                    actions.push(action);
                    totalDuration = Math.max(totalDuration, clip.duration);
                });
            }

            // Start hidden
            model.visible = false;
            scene.add(model);

            console.log(`Scene ${i} "${entry.name}": radius=${radius.toFixed(1)}, center=${center.toArray().map(v=>v.toFixed(1))}`);

            // pctEnd = next scene's pctStart, or 1.0 for last
            const pctStart = entry.pct;
            const pctEnd = (i < SCENES.length - 1) ? SCENES[i + 1].pct : 1.0;

            loadedScenes[i] = {
                model, mixer, actions, totalDuration,
                center: new THREE.Vector3(0, 0, 0),
                radius,
                pctStart, pctEnd,
                name: entry.name
            };

            loadedCount++;
            loadPct.textContent = Math.round((loadedCount / SCENES.length) * 100);
            resolve();
        },
        undefined,
        (err) => {
            console.warn(`Failed to load ${entry.file}, retrying without KTX2...`, err);
            // Retry with a fresh loader without KTX2
            const fallbackLoader = new GLTFLoader();
            fallbackLoader.load(
                'assets/models/' + entry.file,
                (gltf) => {
                    const model = gltf.scene;
                    // Apply fallback white material to all meshes
                    model.traverse((child) => {
                        if (child.isMesh) {
                            child.material = new THREE.MeshStandardMaterial({
                                color: 0xaaaaaa, metalness: 0.3, roughness: 0.6, side: THREE.DoubleSide
                            });
                        }
                    });
                    const box = new THREE.Box3().setFromObject(model);
                    const center = box.getCenter(new THREE.Vector3());
                    const size = box.getSize(new THREE.Vector3());
                    const maxDim = Math.max(size.x, size.y, size.z, 0.01);
                    const TARGET_SIZE = 40;
                    const scaleFactor = TARGET_SIZE / maxDim;
                    model.scale.multiplyScalar(scaleFactor);
                    model.position.copy(center).multiplyScalar(-scaleFactor);
                    const radius = TARGET_SIZE * 0.5;

                    let mixer = null;
                    let actions = [];
                    let totalDuration = 0;
                    if (gltf.animations?.length) {
                        mixer = new THREE.AnimationMixer(model);
                        gltf.animations.forEach(clip => {
                            const action = mixer.clipAction(clip);
                            action.play();
                            action.paused = true;
                            actions.push(action);
                            totalDuration = Math.max(totalDuration, clip.duration);
                        });
                    }

                    model.visible = false;
                    scene.add(model);
                    const pctStart = entry.pct;
                    const pctEnd = (i < SCENES.length - 1) ? SCENES[i + 1].pct : 1.0;
                    loadedScenes[i] = { model, mixer, actions, totalDuration, center: new THREE.Vector3(), radius, pctStart, pctEnd, name: entry.name };
                    console.log(`Fallback loaded ${entry.name}: radius=${radius.toFixed(1)}`);
                    loadedCount++;
                    loadPct.textContent = Math.round((loadedCount / SCENES.length) * 100);
                    resolve();
                },
                undefined,
                () => { loadedCount++; loadPct.textContent = Math.round((loadedCount / SCENES.length) * 100); resolve(); }
            );
        }
    );
}));

return Promise.all(promises);
}

let started = false;
loadAllModels().then(() => {
    loadPct.textContent = '100';
    preloaderBtn.textContent = 'Enter';
    // Expose for debugging
    window._debug = { loadedScenes, scene, camera, renderer };
    // Show first scene immediately
    if (loadedScenes[0]) {
        loadedScenes[0].model.visible = true;
        activeSceneIdx = 0;
    }
    console.log('All loaded. Scenes:', loadedScenes.map(s => s ? `${s.name}: r=${s.radius.toFixed(1)}` : 'null'));
});

preloaderBtn.addEventListener('click', () => {
    if (loadedCount < SCENES.length) return;
    preloader.classList.add('done');
    started = true;
});

// ─── SCROLL ───
let scrollProgress = 0;
const progressBar = document.getElementById('progress');
const scrollHint = document.getElementById('scroll-hint');
const homeContent = document.getElementById('home-content');
const footerRow = document.getElementById('footer-row');

window.addEventListener('scroll', () => {
    const scrollTop = window.scrollY;
    const docHeight = document.getElementById('scroll-driver').scrollHeight - window.innerHeight;
    scrollProgress = Math.max(0, Math.min(1, scrollTop / docHeight));

    progressBar.style.width = (scrollProgress * 100) + '%';
    scrollHint.classList.toggle('hidden', scrollTop > 200);
    homeContent.classList.toggle('faded', scrollProgress > 0.015);
    footerRow.classList.toggle('hide', scrollProgress > 0.015);
}, { passive: true });

// Nav click scrolling
document.querySelectorAll('header a[href^="#"]').forEach(link => {
    link.addEventListener('click', (e) => {
        e.preventDefault();
        const targetId = link.getAttribute('href').substring(1);
        const sceneEntry = SCENES.find(s => s.id === targetId);
        if (sceneEntry) {
            const docHeight = document.getElementById('scroll-driver').scrollHeight - window.innerHeight;
            window.scrollTo({ top: sceneEntry.pct * docHeight, behavior: 'smooth' });
        }
    });
});

// ─── MOUSE ───
let mouseX = 0, mouseY = 0;
window.addEventListener('mousemove', (e) => {
    mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
    mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
});

// ─── SCENE SWITCHING + CAMERA ORBIT ───
function getActiveScene(progress) {
    for (let i = loadedScenes.length - 1; i >= 0; i--) {
        if (loadedScenes[i] && progress >= loadedScenes[i].pctStart) return i;
    }
    return 0;
}

function smoothCameraOrbit(sceneData, localProgress, time) {
    // Camera orbits inside the scene based on local scroll progress
    const r = sceneData.radius * 0.6;
    const angle = localProgress * Math.PI * 2.5; // ~2.5 full rotations through the scene
    const height = Math.sin(localProgress * Math.PI) * r * 0.5; // rise and fall

    const targetX = Math.sin(angle) * r + mouseX * r * 0.15;
    const targetY = height + mouseY * r * 0.1;
    const targetZ = Math.cos(angle) * r;

    // Smooth interpolation
    camera.position.x += (targetX - camera.position.x) * 0.04;
    camera.position.y += (targetY - camera.position.y) * 0.04;
    camera.position.z += (targetZ - camera.position.z) * 0.04;

    // Look toward center with slight offset based on progress
    const lookTarget = sceneData.center.clone();
    lookTarget.y += Math.sin(localProgress * Math.PI * 2) * r * 0.1;
    camera.lookAt(lookTarget);
}

// ─── ANIMATION ───
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);
    const dt = clock.getDelta();
    const time = clock.getElapsedTime();

    // Determine which scene is active
    const newIdx = getActiveScene(scrollProgress);
    if (newIdx !== activeSceneIdx) {
        // Hide previous, show new
        if (activeSceneIdx >= 0 && loadedScenes[activeSceneIdx]) {
            loadedScenes[activeSceneIdx].model.visible = false;
        }
        activeSceneIdx = newIdx;
        if (loadedScenes[activeSceneIdx]) {
            loadedScenes[activeSceneIdx].model.visible = true;
        }
    }

    const sd = loadedScenes[activeSceneIdx];
    if (sd) {
        // Local progress within this scene (0-1)
        const range = sd.pctEnd - sd.pctStart;
        const localProgress = range > 0 ? Math.max(0, Math.min(1, (scrollProgress - sd.pctStart) / range)) : 0;

        // Drive camera orbit
        smoothCameraOrbit(sd, localProgress, time);

        // Drive GLB animations by scroll
        if (sd.mixer && sd.totalDuration > 0) {
            const targetTime = localProgress * sd.totalDuration;
            sd.mixer.setTime(targetTime);
        }
    }

    // Move lights near camera
    movingLight1.position.set(
        camera.position.x - 10 + Math.sin(time * 0.3) * 5,
        camera.position.y + 8,
        camera.position.z + 10
    );
    movingLight2.position.set(
        camera.position.x + 10 + Math.cos(time * 0.25) * 5,
        camera.position.y - 5,
        camera.position.z + 5
    );
    movingLight3.position.set(
        camera.position.x + Math.sin(time * 0.2) * 8,
        camera.position.y + 12,
        camera.position.z - 10
    );

    composer.render();
}

animate();

// ─── RESIZE ───
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    composer.setSize(window.innerWidth, window.innerHeight);
});

</script>
</body>
